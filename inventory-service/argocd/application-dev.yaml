apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cognition-Partner-Workshops/app_dotnet-angular-monolith.git
    targetRevision: workshop-rajep3
    path: inventory-service/helm/inventory-service
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: inventory-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
