replicaCount: 1

image:
  tag: dev-latest

ingress:
  hosts:
    - host: inventory-dev.workshop.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: Development
  - name: ConnectionStrings__DefaultConnection
    value: "Data Source=inventory.db"

persistence:
  enabled: false
