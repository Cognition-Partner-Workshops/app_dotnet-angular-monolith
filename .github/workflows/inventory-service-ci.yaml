name: Inventory Service - Build and Push to ECR

on:
  push:
    branches: [main, workshop-rajep3]
    paths:
      - 'inventory-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'inventory-service/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 599083837640.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: workshop/inventory-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: inventory-service
        run: dotnet restore

      - name: Build
        working-directory: inventory-service
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        working-directory: inventory-service
        run: dotnet test --no-build --configuration Release --verbosity normal

  build-and-push:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599083837640:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f inventory-service/docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger ArgoCD sync
        run: |
          echo "ArgoCD will auto-sync from the repository based on the syncPolicy configuration."
          echo "Image tag: $IMAGE_TAG"
