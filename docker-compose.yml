version: '3.8'

services:
  customer-service:
    build:
      context: ./services/CustomerService
      dockerfile: Dockerfile
    ports:
      - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/customer.db
    volumes:
      - customer-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  product-service:
    build:
      context: ./services/ProductService
      dockerfile: Dockerfile
    ports:
      - "5020:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/product.db
    volumes:
      - product-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  inventory-service:
    build:
      context: ./services/InventoryService
      dockerfile: Dockerfile
    ports:
      - "5030:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/inventory.db
    volumes:
      - inventory-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  order-service:
    build:
      context: ./services/OrderService
      dockerfile: Dockerfile
    ports:
      - "5040:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/order.db
      - ServiceUrls__CustomerService=http://customer-service:8080
      - ServiceUrls__ProductService=http://product-service:8080
      - ServiceUrls__InventoryService=http://inventory-service:8080
    volumes:
      - order-data:/data
    depends_on:
      customer-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: services/Gateway/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ServiceUrls__CustomerService=http://customer-service:8080
      - ServiceUrls__ProductService=http://product-service:8080
      - ServiceUrls__InventoryService=http://inventory-service:8080
      - ServiceUrls__OrderService=http://order-service:8080
      - ReverseProxy__Clusters__customer-cluster__Destinations__destination1__Address=http://customer-service:8080
      - ReverseProxy__Clusters__product-cluster__Destinations__destination1__Address=http://product-service:8080
      - ReverseProxy__Clusters__inventory-cluster__Destinations__destination1__Address=http://inventory-service:8080
      - ReverseProxy__Clusters__order-cluster__Destinations__destination1__Address=http://order-service:8080
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  customer-data:
  product-data:
  inventory-data:
  order-data:
